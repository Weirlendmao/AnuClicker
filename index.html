<!DOCTYPE html><html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clicker Game</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <div class="card">
      <div class="header">
        <div class="stat">Crot Keluar: <strong><span id="score">0</span></strong></div>
        <div class="pill">Klik</div>
      </div><div class="click-area">
    <button class="click-btn" onclick="addToScore(1)">
      <img id="mainSkin" src="images/skin_0.jpg" />
    </button>
  </div>

  <div class="footer">
    <div class="pill">Auto / detik: <strong><span id="cursors">0</span></strong></div>
  </div>
</div>

<div class="card shop">
  <h3>Upgrade</h3>

  <div class="upgrade">
    <div>
      <strong>Foto Bugil</strong><br />+1 / detik
    </div>
    <button onclick="buyCursor()">Beli [<span id="cursorcost">15</span>]</button>
  </div>

  <div class="upgrade">
    <div>
      <strong>Hotel oyo</strong><br />+5 / detik
    </div>
    <button onclick="buyOyo()">Beli [<span id="oyocost">75</span>]</button>
  </div>

  <div class="upgrade">
    <div>
      <strong>LC</strong><br />+10 / detik
    </div>
    <button onclick="buyLC()">Beli [<span id="lccost">250</span>]</button>
  </div>
</div>

<div class="card shop">
  <h3>Skin Select</h3>
  <div id="skinGrid" class="skin-grid"></div>
</div>

  </div>  <script src="script.js"></script></body>
</html>
